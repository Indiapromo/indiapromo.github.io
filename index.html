<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IndiaPromo — Best Coupons &amp; Promo Codes for India</title>
  <meta name="description" content="Find the best coupons, promo codes and discount deals for Indian shoppers. Save money every time you shop online." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <link rel="stylesheet" href="v2-style.css" />
</head>
<body>

  <!-- ═══════════ HEADER / HERO ═══════════ -->
  <header class="v2-header">
    <div class="v2-search-wrap">
      <h1>🇮🇳 IndiaPromo</h1>
      <p>Hundreds of coupons &amp; promo codes for Indian shoppers, updated daily</p>

      <div class="v2-search-row">
        <input
          id="v2-search"
          type="search"
          autocomplete="off"
          placeholder="Search by store, brand or keyword…"
          aria-label="Search coupons"
        />
        <button id="v2-search-btn" aria-label="Search">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
          </svg>
          Search
        </button>
      </div>
    </div>
  </header>

  <!-- ═══════════ STICKY FILTER BAR ═══════════ -->
  <div class="v2-sticky-bar">
    <div class="v2-filter-inner">

      <label id="v2-promo-toggle" class="v2-toggle-btn">
        <input id="v2-promo-cb" type="checkbox" />
        Promo codes only
      </label>

      <select id="v2-category" class="v2-select" aria-label="Filter by category">
        <option value="all">All categories</option>
      </select>

      <select id="v2-merchant" class="v2-select" aria-label="Filter by merchant">
        <option value="all">All merchants</option>
      </select>

      <span id="v2-count" class="v2-result-count">Loading…</span>
    </div>
  </div>

  <!-- ═══════════ MAIN GRID ═══════════ -->
  <main class="v2-main">
    <div id="v2-grid" class="v2-grid" role="list" aria-live="polite" aria-label="Coupon deals">
    </div>
  </main>

  <!-- ═══════════ FOOTER ═══════════ -->
  <footer style="text-align:center;padding:2rem 1rem;font-size:.8rem;color:#94a3b8;">
    Deals sourced via Admitad. Prices &amp; availability may vary. &copy; IndiaPromo
                                                  <div id="dataset-updated-at" style="margin-top:.5rem;opacity:.9;">Last updated: 2026-06-06 00:14 UTC</div>
  </footer>

  <script src="v2-app.js"></script>
</body>
</html>
